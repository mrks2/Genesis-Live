name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-title:
    name: Conventional Commits title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            chore
            test
            perf
            ci
            build
            revert
          requireScope: false
          subjectPattern: ^[a-zà-ÿ].+$
          subjectPatternError: |
            Le titre de la PR doit commencer par un verbe en minuscules.
            Exemples : "feat: ajouter la spéciation âge IV", "fix: corriger le calcul de fitness"
            Voir README.md § Workflow Git.
